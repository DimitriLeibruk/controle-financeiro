<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Controle financeiro</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- HEADER -->
  <header class="header">
    <div class="container header-container">
      
      <h1>💰 Finance Control</h1>

      <div class="month-navigation">
      <button id="prevMonth" class="nav-btn">⬅</button>

      <div class="month-selector">
        <span id="currentMonthDisplay" class="current-month"></span>

        <!-- DROPDOWN -->
        <div id="calendarDropdown" class="calendar-dropdown hidden">
          <div class="calendar-header">
            <span id="calendarYearDisplay"></span>
          </div>
          <div id="calendarGrid" class="calendar-grid"></div>
        </div>
      </div>

      <button id="nextMonth" class="nav-btn">➡</button>
    </div>

    </div>
  </header>

  <!-- DASHBOARD -->
  <section class="dashboard container">

    <div class="card receita">
      <h2>Receita Total</h2>
      <p id="totalReceita">R$ 0,00</p>
    </div>

    <div class="card despesa">
      <h2>Despesa Total</h2>
      <p id="totalDespesa">R$ 0,00</p>
    </div>

    <div class="card saldo">
      <h2>Saldo Atual</h2>
      <p id="saldoAtual">R$ 0,00</p>
    </div>

  </section>

  <!-- FORMULÁRIO -->
  <section class="form-section container">
    <h2>Adicionar Transação</h2>

    <form id="transactionForm">

      <div class="form-group">
        <label for="tipo">Tipo</label>
        <select id="tipo" required>
          <option value="">Selecione</option>
          <option value="receita">Receita</option>
          <option value="despesa">Despesa</option>
        </select>
      </div>

      <div class="form-group">
        <label for="descricao">Descrição</label>
        <input type="text" id="descricao" required>
      </div>

      <div class="form-group">
        <label for="valor">Valor</label>
        <input type="number" id="valor" step="0.01" required>
      </div>

      <div class="form-group">
        <label for="categoria">Categoria</label>
        <select id="categoria">
          <option value="">Selecione</option>
          <option value="Moradia">Moradia</option>
          <option value="Alimentação">Alimentação</option>
          <option value="Transporte">Transporte</option>
          <option value="Lazer">Lazer</option>
          <option value="Saúde">Saúde</option>
          <option value="Outros">Outros</option>
        </select>
      </div>

      <div class="form-group">
        <label for="data">Data</label>
        <input type="date" id="data" required>
      </div>

      <button type="submit" class="btn-add">Adicionar</button>

    </form>
  </section>

  <!-- LISTA DE TRANSAÇÕES -->
  <section class="transactions container">
    <h2>Transações</h2>

    <table>
      <thead>
        <tr>
          <th>Tipo</th>
          <th>Descrição</th>
          <th>Categoria</th>
          <th>Valor</th>
          <th>Data</th>
          <th>Ações</th>
        </tr>
      </thead>
      <tbody id="transactionList">
        <!-- JS vai inserir aqui -->
      </tbody>
    </table>
  </section>

  <!-- META FINANCEIRA -->
  <section class="meta container">
    <h2>Meta Financeira</h2>

    <div class="meta-config">
      <label for="metaPercent">Percentual para guardar (%)</label>
      <input type="number" id="metaPercent" value="20" min="0" max="100">
    </div>

    <div class="meta-info">
      <p>Meta ideal: <span id="metaIdeal">R$ 0,00</span></p>
      <p>Economia atual: <span id="metaAtual">R$ 0,00</span></p>
      <p>Status: <span id="metaStatus">-</span></p>
    </div>

    <div class="progress-bar">
      <div class="progress" id="metaProgress"></div>
    </div>

  </section>

  <script src="script.js"></script>
</body>
</html>
